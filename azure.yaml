# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: challenge5
metadata:
  template: challenge5-agent-mcp

infra:
  provider: bicep
  path: infra
  module: main

hooks:
  postprovision:
    windows:
      shell: pwsh
      run: ./scripts/postprovision.ps1
      interactive: true
      continueOnError: false
    posix:
      shell: sh
      run: |
        echo "Post-provision: installing dependencies and seeding data..."
        pip install -r requirements.txt --quiet
        python scripts/seed_cosmos.py
        echo "Setup complete. Run: python src/backend/app.py & python src/frontend/app.py"

# Map Bicep outputs to azd environment variables
pipeline:
  provider: azd

services: {}
